name: CI Shell State Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shell-state-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run shell state tests
        run: bash Tools/dev/run_shell_state_tests.sh
