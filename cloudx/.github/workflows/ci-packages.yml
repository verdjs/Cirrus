name: CI Packages

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  packages:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Swift version
        run: swift --version

      - name: Run package sweep
        run: bash Tools/dev/run_package_sweep.sh
