name: CI App Build And Smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  app-build-and-smoke:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Stratix-Debug
        run: bash Tools/dev/run_debug_build.sh

      - name: Run app bundle smoke tests
        run: bash Tools/dev/run_app_smoke.sh
