name: CI Runtime Safety

on:
  pull_request:
    paths:
      - 'Apps/Stratix/Sources/Stratix/Integration/WebRTC/**'
      - 'Apps/Stratix/Sources/Stratix/Features/Streaming/**'
      - 'Packages/StreamingCore/**'
      - 'Packages/InputBridge/**'
      - 'Packages/DiagnosticsKit/**'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  runtime-safety:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run WebRTC safety tests
        run: bash Tools/dev/run_runtime_safety.sh
