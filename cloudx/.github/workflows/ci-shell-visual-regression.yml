name: CI Shell Visual Regression (Manual)

on:
  # Keep screenshot-diff capture opt-in until hosted runner support is stable again.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-visual-regression:
    runs-on: macos-15
    env:
      CAPTURE_DIR: /tmp/stratix-shell-checkpoints
      DIFF_DIR: /tmp/stratix-shell-checkpoints-diff
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Run manual shell visual regression
        run: bash Tools/test/run_shell_visual_regression.sh

      - name: Upload shell visual regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shell-visual-regression-artifacts
          path: |
            /tmp/stratix-shell-checkpoints
            /tmp/stratix-shell-checkpoints-diff
