name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '23 5 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build_mode: none
            runner: ubuntu-latest
          - language: python
            build_mode: none
            runner: ubuntu-latest
          - language: swift
            build_mode: manual
            runner: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        if: matrix.language == 'swift'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}

      - name: Install Metal toolchain
        if: matrix.language == 'swift'
        run: |
          # GitHub-hosted Xcode 26 runners can omit the Metal toolchain, but Stratix
          # compiles CASShader.metal as part of the app target during CodeQL extraction.
          if ! xcrun --find metal >/dev/null 2>&1; then
            xcodebuild -downloadComponent MetalToolchain
          fi

      - name: Build Stratix for CodeQL
        if: matrix.language == 'swift'
        run: bash Tools/dev/run_debug_build.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
